version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: autolang
    main: ./cmd/autolang
    binary: autolang
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}

archives:
  - id: autolang
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    format: tar.gz
    files:
      - README.md
      - LICENSE
      - CHANGELOG.md

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - Merge pull request
      - Merge branch

brews:
  - name: autolang
    repository:
      owner: YOUR_USERNAME
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: "https://github.com/YOUR_USERNAME/autolang"
    description: "Write in Korean. Get English-quality AI responses."
    license: "MIT"
    install: |
      bin.install "autolang"
    test: |
      system "#{bin}/autolang --version"
